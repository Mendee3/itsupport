<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админ нэвтрэх</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f4f6fb;
      --card-border: #dfe5f1;
      --text-main: #1f2a44;
      --text-soft: #6d7892;
      --blue: #1f66e5;
      --blue-dark: #1653c1;
      --shadow: 0 14px 28px rgba(24, 47, 94, 0.12);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top right, rgba(31, 102, 229, 0.12), transparent 28%),
        linear-gradient(180deg, #f9fbff 0%, var(--page-bg) 100%);
    }

    .login-shell {
      width: min(100%, 460px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-top {
      padding: 24px 24px 10px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue-dark);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-soft);
    }

    form {
      padding: 8px 24px 24px;
    }

    .field {
      position: relative;
      margin-top: 14px;
    }

    .field i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b88a8;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      border: 1px solid #d8e1f2;
      border-radius: 12px;
      background: #f9fbff;
      padding: 12px 12px 12px 40px;
      outline: none;
    }

    .field input:focus {
      border-color: #92b2ef;
      box-shadow: 0 0 0 3px rgba(31, 102, 229, 0.1);
    }

    .login-btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(180deg, #2e78f7 0%, var(--blue-dark) 100%);
      box-shadow: 0 8px 18px rgba(31, 102, 229, 0.22);
    }

    .error-box {
      margin: 0 24px;
      border: 1px solid #f0c7c5;
      border-radius: 12px;
      background: #fff2f2;
      color: #9a3b39;
      padding: 10px 12px;
      font-size: 0.94rem;
    }
  </style>
</head>
<body>
  <section class="login-shell">
    <div class="login-top">
      <div class="kicker"><i class="bi bi-shield-lock"></i> Админ эрх</div>
      <h1>Нэвтрэх</h1>
      <p class="subtitle">Хуваарь болон инженерүүдийг удирдахын тулд админ эрхээрээ нэвтэрнэ үү.</p>
    </div>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('admin.login_post', next=request.args.get('next')) }}">
      <label class="field">
        <i class="bi bi-person"></i>
        <input name="username" placeholder="Нэвтрэх нэр" required>
      </label>
      <label class="field">
        <i class="bi bi-key"></i>
        <input name="password" type="password" placeholder="Нууц үг" required>
      </label>
      <button class="login-btn" type="submit">Нэвтрэх</button>
    </form>
  </section>
</body>
</html>
